name: Verify Aseprite Access
on:
  workflow_dispatch:
  schedule:
    # Run weekly on Mondays at 9:00 UTC
    - cron: '0 9 * * 1'

jobs:
  verify-access:
    name: Verify Aseprite Repository Access
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Verification Script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pwsh scripts/verify-aseprite-access.ps1 -Verbose
        continue-on-error: true

      - name: Check for ASEPRITE_BUILDS_TOKEN
        id: check-token
        run: |
          if ("${{ secrets.ASEPRITE_BUILDS_TOKEN }}" -ne "") {
            echo "has_token=true" >> $env:GITHUB_OUTPUT
            Write-Host "ASEPRITE_BUILDS_TOKEN is configured"
          } else {
            echo "has_token=false" >> $env:GITHUB_OUTPUT
            Write-Host "ASEPRITE_BUILDS_TOKEN is NOT configured (expected)"
          }

      - name: Create Issue if Token Missing
        if: steps.check-token.outputs.has_token == 'false'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const title = '⚠️ Aseprite Repository - Authentication Token Not Configured';
            const body = `## Aseprite Repository Authentication Status

            The \`ASEPRITE_BUILDS_TOKEN\` secret is not configured for the Excavator workflow.

            ### Current Status

            - ✅ Private repository is working as designed
            - ❌ Excavator auto-updates will fail without authentication token
            - ❌ GitHub Actions cannot access the private repository

            ### Why This Matters

            The \`aseprite-builds\` repository is intentionally private to comply with Aseprite's Terms of Service. However, for automated updates via Excavator to work, you need to configure a GitHub token.

            ### Action Required (Repository Owner Only)

            1. **Create a Personal Access Token (PAT)**
               - Go to https://github.com/settings/tokens
               - Create a token with \`repo\` scope
               - Copy the token

            2. **Add Token as Repository Secret**
               - Go to https://github.com/${{ github.repository }}/settings/secrets/actions
               - Click "New repository secret"
               - Name: \`ASEPRITE_BUILDS_TOKEN\`
               - Value: Paste your PAT
               - Click "Add secret"

            3. **Verify Configuration**
               - Re-run this workflow: [Verify Aseprite Access](https://github.com/${{ github.repository }}/actions/workflows/verify-aseprite-access.yml)
               - The issue should auto-close if configured correctly

            ### For End Users

            This does NOT affect end users who:
            - Have their own Git credentials configured
            - Have been granted direct access to the private repository
            - Follow the setup guide in [ASEPRITE_ACCESS_SETUP.md](./ASEPRITE_ACCESS_SETUP.md)

            ### Documentation

            - [ASEPRITE_ACCESS_SETUP.md](./ASEPRITE_ACCESS_SETUP.md) - Complete setup guide

            ---
            *This issue was automatically created by the Verify Aseprite Access workflow.*
            *Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}*`;

            // Check if an issue already exists
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'aseprite-access'
            });

            if (issues.data.length === 0) {
              // Create new issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['aseprite-access', 'configuration', 'automated-updates']
              });
              console.log('Created new issue for aseprite token configuration');
            } else {
              console.log('Issue already exists, skipping creation');
            }

      - name: Close Issue if Token Configured
        if: steps.check-token.outputs.has_token == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // If token is configured, close any open issues
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'aseprite-access'
            });

            for (const issue of issues.data) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: '✅ ASEPRITE_BUILDS_TOKEN is now configured! Excavator should be able to check for updates automatically.\n\n*Verified by workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}*'
              });

              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed'
              });

              console.log(`Closed issue #${issue.number}`);
            }

