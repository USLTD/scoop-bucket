name: Verify Aseprite Access
on:
  workflow_dispatch:
  schedule:
    # Run weekly on Mondays at 9:00 UTC
    - cron: '0 9 * * 1'

jobs:
  verify-access:
    name: Verify Aseprite Repository Access
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Verification Script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pwsh scripts/verify-aseprite-access.ps1 -Verbose
        continue-on-error: true

      - name: Create Issue if Access Fails
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const title = '⚠️ Aseprite Repository Access Issue Detected';
            const body = `## Aseprite Repository Access Verification Failed

            The automated access verification for the aseprite-builds repository has failed.

            ### What This Means

            The private repository \`https://github.com/USLTD/aseprite-builds\` is not accessible, which means:
            - Users cannot install the aseprite package
            - The Excavator auto-update workflow may fail
            - Downloads will return 404 Not Found errors

            ### Actions Required

            Please choose one of the following solutions:

            1. **Make releases public (Recommended)**
               - Go to https://github.com/USLTD/aseprite-builds/settings
               - Ensure release assets are publicly accessible
               - This allows downloads without authentication

            2. **Configure GitHub Token**
               - Create a PAT with \`repo\` scope
               - Add it as \`ASEPRITE_BUILDS_TOKEN\` secret
               - Update workflows to use the token

            3. **Use GitHub Actions Artifacts**
               - Switch to using nightly.link service
               - See \`fiddler-everywhere-patched.json\` for example

            ### Documentation

            For detailed instructions, see:
            - [ASEPRITE_ACCESS_SETUP.md](./ASEPRITE_ACCESS_SETUP.md)

            ### Verification

            Run the verification script locally:
            \`\`\`powershell
            pwsh scripts/verify-aseprite-access.ps1
            \`\`\`

            ---
            *This issue was automatically created by the Verify Aseprite Access workflow.*
            *Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}*`;

            // Check if an issue already exists
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'aseprite-access'
            });

            if (issues.data.length === 0) {
              // Create new issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['aseprite-access', 'bug', 'private-repo']
              });
              console.log('Created new issue for aseprite access failure');
            } else {
              console.log('Issue already exists, skipping creation');
            }

      - name: Comment on Success
        if: success()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // If access verification succeeds, close any open issues
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'aseprite-access'
            });

            for (const issue of issues.data) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: '✅ Access verification succeeded! The aseprite-builds repository is now accessible.\n\n*Verified by workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}*'
              });

              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed'
              });

              console.log(`Closed issue #${issue.number}`);
            }
