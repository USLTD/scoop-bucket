name: Aseprite Version Check

on:
  workflow_dispatch:
  schedule:
    # run every 4 hours
    - cron: '20 */4 * * *'

permissions:
  contents: write

jobs:
  check-version:
    name: Check Aseprite Version
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@main

      - name: Check Aseprite version
        id: checkver
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.ASEPRITE_BUILDS_TOKEN }}
        run: |
          # Get current version from manifest
          $manifest = Get-Content -Path "bucket/aseprite.json" -Raw | ConvertFrom-Json
          $currentVersion = $manifest.version
          Write-Output "Current version in manifest: $currentVersion"
      
          # Get latest version from private repo via gh
          try {
            $latestVersion = gh api repos/USLTD/aseprite-builds/releases/latest --jq ".tag_name"
            Write-Output "Latest version on GitHub: $latestVersion"
          } catch {
            Write-Error "Failed to fetch latest release. Check token permissions."
            exit 1
          }
      
          # Compare versions
          if ($currentVersion -ne $latestVersion) {
            "new_version_available=true" >> $env:GITHUB_OUTPUT
            "current_version=$currentVersion" >> $env:GITHUB_OUTPUT
            "latest_version=$latestVersion" >> $env:GITHUB_OUTPUT
            Write-Output "::notice::New Aseprite version available: $latestVersion (current: $currentVersion)"
          } else {
            "new_version_available=false" >> $env:GITHUB_OUTPUT
            Write-Output "::notice::Aseprite is up to date: $currentVersion"
          }

      - name: Update manifest for new version
        if: steps.checkver.outputs.new_version_available == 'true'
        shell: pwsh
        env:
          LATEST_VERSION: ${{ steps.checkver.outputs.latest_version }}
        run: |
          $manifestPath = "bucket/aseprite.json"
          $version = $env:LATEST_VERSION

          Write-Output "Updating manifest to version $version"

          $content = Get-Content -Path $manifestPath -Raw
          $updated = $content

          # Escape $ in replacement strings to avoid PowerShell regex backreference substitution
          $safeVersion = $version -replace '\$', '$$$$'

          $updated = $updated -replace '(?m)(^\s*"version"\s*:\s*")[^"]+(")', "`$1$safeVersion`$2"

          $url64 = "https://github.com/USLTD/aseprite-builds/releases/download/$version/aseprite-$version-windows-x64.zip"
          $url32 = "https://github.com/USLTD/aseprite-builds/releases/download/$version/aseprite-$version-windows-x86.zip"
          $safeUrl64 = $url64 -replace '\$', '$$$$'
          $safeUrl32 = $url32 -replace '\$', '$$$$'

          $updated = $updated -replace 'https://github.com/USLTD/aseprite-builds/releases/download/[^/]+/aseprite-[^/]+-windows-x64\.zip', $safeUrl64
          $updated = $updated -replace 'https://github.com/USLTD/aseprite-builds/releases/download/[^/]+/aseprite-[^/]+-windows-x86\.zip', $safeUrl32

          if ($updated -eq $content) {
            Write-Warning "No manifest changes were applied."
          } else {
            $updated | Set-Content -Path $manifestPath -Encoding UTF8
            Write-Output "Manifest updated."
          }

      - name: Commit manifest update
        if: steps.checkver.outputs.new_version_available == 'true' && github.ref == 'refs/heads/main'
        shell: pwsh
        env:
          LATEST_VERSION: ${{ steps.checkver.outputs.latest_version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add bucket/aseprite.json
          $version = $env:LATEST_VERSION
          git commit -m "aseprite: update to $version" || Write-Output "No changes to commit"
          git push
